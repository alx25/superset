{% extends "appbuilder/baselayout.html" %}
{% block content %}
<div class="col-lg-6 col-md-8 col-sm-12 mx-auto mt-4">
    <div class="card">
        <div class="card-body">
            <p>{{ message }}</p>
            {% if redirect %}
                <p class="mt-3">
                    <a class="btn btn-primary" href="{{ redirect }}">Continuar</a>
                </p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
